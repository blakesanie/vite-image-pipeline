name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual invocation from the GitHub Actions tab

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Execute if triggered manually OR if the push commit is a Pull Request merge event.
    # This prevents the workflow from executing on direct, forced, or unreviewed commits pushed straight to main.
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.head_commit.author.name != 'web-flow' && 
       (contains(github.event.head_commit.message, 'Merge pull request') || contains(github.event.head_commit.message, 'Merge branch')))
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}